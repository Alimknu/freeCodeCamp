<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photography Exhibit</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <div class="main-container grid grid-cols-1 gap-2">
      <div class="card rounded-md p-4">
        <img
          class="rounded-md"
          src="https://cdn.freecodecamp.org/curriculum/labs/colosseo.jpg"
          alt="colosseo"
        />
        <p class="subheading font-semibold text-base">Subheading</p>
        <p class="description text-base">Description</p>
      </div>
      <div class="card rounded-md p-4">
        <img
          class="rounded-md"
          src="https://cdn.freecodecamp.org/curriculum/labs/alps.jpg"
          alt="alps"
        />
        <p class="subheading font-semibold text-base">Subheading</p>
        <p class="description text-base">Description</p>
      </div>
      <div class="card rounded-md p-4">
        <img
          class="rounded-md"
          src="https://cdn.freecodecamp.org/curriculum/labs/sea.jpg"
          alt="sea"
        />
        <p class="subheading font-semibold text-base">Subheading</p>
        <p class="description text-base">Description</p>
      </div>
    </div>
  </body>
</html>
