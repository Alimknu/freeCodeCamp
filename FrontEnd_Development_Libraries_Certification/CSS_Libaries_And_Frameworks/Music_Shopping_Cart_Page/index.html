<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music Shopping Cart Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <div id="shopping-cart-container" class="flex flex-col lg:flex-row">
      <div id="products-container">
        <div class="card">
          <h2 class="text-lg">Product 1</h2>
          <p class="quantity">4</p>
          <p class="price">$24</p>
          <button class="remove-button bg-red-500 hover:bg-red-200">
            Remove
          </button>
        </div>
        <div class="card">
          <h2 class="text-lg">Product 2</h2>
          <p class="quantity">7</p>
          <p class="price">$21</p>
          <button class="remove-button bg-red-500 hover:bg-red-200">
            Remove
          </button>
        </div>
      </div>
      <div id="order-summary-container" class="rounded-md border-4">
        <h2 class="text-lg font-semibold">Order Summary</h2>
        <p id="total" class="font-semibold text-base">Total:</p>
        <p id="total-amount" class="">$2000</p>
        <a href="#" class="block text-center bg-blue-700 hover:bg-blue-400">Checkout</a>
      </div>
    </div>
  </body>
</html>
