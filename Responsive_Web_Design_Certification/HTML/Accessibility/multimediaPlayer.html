<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multimedia Player</title>
  </head>

  <body>
    <main>
      <h1>Multimedia Player</h1>
      <section>
        <h2>Song Playing:</h2>
        <audio controls aria-label="true">
            <source src="https://cdn.freecodecamp.org/curriculum/js-music-player/sailing-away.mp3" type="audio/mp3">
        </audio>
      </section>
      <section>
        <h2>Video Playing</h2>
        <video controls width="540" aria-label="true" >
            <source src="https://cdn.freecodecamp.org/curriculum/labs/what-is-the-map-method-and-how-does-it-work.mp4" type="video/mp4">
            <track src="https://cdn.freecodecamp.org/curriculum/labs/what-is-the-map-method-and-how-does-it-work.vtt" kind="subtitles" srclang="en" label="alt">
        </video>
      </section>
      <section>
        <h2>Transcript</h2>
        <p>Example transcript</p>
      </section>
    </main>
  </body>
</html>
