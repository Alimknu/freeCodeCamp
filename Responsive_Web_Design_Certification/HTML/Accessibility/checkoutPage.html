<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Checkout Page</title>
  </head>

  <body>
    <h1>Checkout</h1>
    <section>
      <h2>Your Cart</h2>
      <img
        src="https://cdn.freecodecamp.org/curriculum/labs/cube.jpg"
        alt="Example alt image"
      />
    </section>
    <section>
      <h2>Payment Information</h2>
      <form>
        <input id="card-name" name="card-name" type="text" required />
        <label for="card-name"><span aria-hidden="true">*</span></label>

        <input
          id="card-number"
          name="card-number"
          type="text"
          required
          aria-describedby="card-number-help"
        />
        <p id="card-number-help" aria-describedby="card-number-help">
          Card Number help text
        </p>
        <label for="card-number"><span aria-hidden="true">*</span></label>
      </form>
    </section>
  </body>
</html>
