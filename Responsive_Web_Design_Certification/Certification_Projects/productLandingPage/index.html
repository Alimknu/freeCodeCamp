<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Landing Page</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <header id="header">
      <img id="header-img" src="https://via.placeholder.com/150" alt="Logo" />
      <nav id="nav-bar">
        <a class="nav-link" href="#features">Features</a>
        <a class="nav-link" href="#video">Demo</a>
        <a class="nav-link" href="#pricing">Pricing</a>
      </nav>
    </header>

    <main>
      <section id="features">
        <h2>Features</h2>
        <p>Minimal feature list.</p>
      </section>

      <section id="video-section">
        <h2>Video</h2>
        <iframe id="video" src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="Demo video" frameborder="0" allowfullscreen></iframe>
      </section>

      <section id="pricing">
        <h2>Pricing</h2>
        <p>Basic plan</p>
      </section>

      <section id="subscribe">
        <form id="form" action="https://www.freecodecamp.org/email-submit" method="post">
          <input id="email" name="email" type="email" placeholder="Enter your email" required />
          <input id="submit" type="submit" value="Submit" />
        </form>
      </section>
    </main>
  </body>
</html>
