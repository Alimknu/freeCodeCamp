<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Survey Form</title>
</head>
<main>
  <h1 id="title">Title</h1>
  <p id="description">description</p>

  <body>
    <form id="survey-form">
      <input id="name" type="text" placeholder="name" required>
      <label id="name-label">Name</label>
      <input id="email" type="email" required placeholder="email@email.com">
      <label id="email-label">Email</label>
      <input id="number" type="number" min="0" max="9" placeholder="7">
      <label id="number-label">Number</label>

      <select id="dropdown">
        <option>1</option>
        <option>2</option>
        </select>

      <input type="radio" value="1" name="a">1</input>
      <input type="radio" value="2" name="a">2</input>

      <input type="checkbox" value="1">1</input>
      <input type="checkbox" value="2">2</input>
      <textarea></textarea>

      <button id="submit">Submit</button>
    </form>
  </body>
</main>

</html>
