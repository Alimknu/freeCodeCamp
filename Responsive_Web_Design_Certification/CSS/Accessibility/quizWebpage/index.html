<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="freeCodeCamp Accessibility Quiz practice project"
    />
    <title>Accessibility Quiz</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <img
        id="logo"
        alt="freeCodeCamp"
        src="https://cdn.freecodecamp.org/platform/universal/fcc_primary.svg"
      />
      <h1>HTML/CSS Quiz</h1>
      <nav>
        <ul>
          <li><a href="#student-info">INFO</a></li>
          <li><a href="#html-questions">HTML</a></li>
          <li><a href="#css-questions">CSS</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <form
        action="https://freecodecamp.org/practice-project/accessibility-quiz"
        method="post"
      >
        <section role="region" aria-labelledby="student-info">
          <h2 id="student-info">Text</h2>
          <div class="info">
            <label for="name">Name</label>
            <input id="name" type="text" name="name" />
          </div>
          <div class="info">
            <label for="email">Email Address</label>
            <input id="email" type="email" name="email" />
          </div>
          <div class="info">
            <label for="dob">Date of Birth</label>
            <input id="dob" type="date" name="dob" />
          </div>
        </section>
        <section role="region" aria-labelledby="html-questions">
          <h2 id="html-questions">Text</h2>
          <div class="question-block">
            <h3><span class="sr-only">Question</span>1</h3>
            <fieldset class="question" name="question1">
              <legend>True or False?</legend>
              <ul class="answers-list">
                <li>
                  Option 1
                  <label for="q1-a1">
                    <input id="q1-a1" type="radio" value="true" name="q1" />True
                  </label>
                </li>
                <li>
                  Option 2
                  <label for="q1-a2">
                    <input
                      id="q1-a2"
                      type="radio"
                      value="false"
                      name="q1"
                    />False
                  </label>
                </li>
              </ul>
            </fieldset>
          </div>
          <div class="question-block">
            <h3><span class="sr-only">Question</span>2</h3>
            <fieldset class="question" name="question2">
              <legend>True or False</legend>
              <ul class="answers-list">
                <li>
                  Option 1
                  <label for="q2-a1">
                    <input id="q2-a1" type="radio" value="true" name="q2" />True
                  </label>
                </li>
                <li>
                  Option 2
                  <label for="q2-a2">
                    <input
                      id="q2-a2"
                      type="radio"
                      value="false"
                      name="q2"
                    />False
                  </label>
                </li>
              </ul>
            </fieldset>
          </div>
        </section>
        <section role="region" aria-labelledby="css-questions">
          <h2 id="css-questions">Text</h2>
          <div class="formrow">
            <div class="question-block">
              <label for="q1">CSS?</label>
            </div>
            <div class="answer">
              <select required name="q1" id="q1">
                <option value="">Select an option</option>
                <option value="yes">Yes</option>
                <option value="no">No</option>
              </select>
            </div>
            <div class="question-block">
              <label for="q2">CSS?</label>
            </div>
            <div class="answer">
              <textarea rows="3" cols="30" name="q2" id="q2"></textarea>
            </div>
          </div>
        </section>

        <button type="submit">Send</button>
      </form>
    </main>

    <footer>
      <address>
        <a href="https://freecodecamp.org">freeCodeCamp</a><br />
        San Francisco<br />
        California<br />
        USA
      </address>
    </footer>
  </body>
</html>
