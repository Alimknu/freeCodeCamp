<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Business Card</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <div class="business-card">
    <body>
    <img src="https://cdn.freecodecamp.org/curriculum/labs/flower.jpg" alt="flower picture" class="profile-image">
    <p class="full-name">Your Name</p>
    <p class="designation">Your Designation</p>
    <p class="company">Your Company</p>
    <hr>
    <p>example@gmail.com</p>
    <p>000-000-0000</p>
    <a class="portfolio-link" href="google.com">Portfolio</a>
    <hr>
    <div class="social-media">
        <h2>Connect with me</h2>
        <a href="google.com">Twitter</a>
        <a href="google.com">LinkedIn</a>
        <a href="google.com">GitHub</a>
    </div>
    </body>
  </div>
</html>
