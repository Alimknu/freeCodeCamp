<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Palindrome Checker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <h1>Is it a Palindrome?</h1>
    <div>
      <label for="text-input">Enter text to check if it is a palindrome:</label>
      <input id="text-input" />
      <p id="result"></p>
      <button class="check-btn" id="check-btn">Check</button>
    </div>
    <script src="script.js"></script>
  </body>
</html>
